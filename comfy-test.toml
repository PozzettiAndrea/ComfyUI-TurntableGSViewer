[test]
levels = ["syntax", "install", "registration", "instantiation"]
publish = true

[test.workflows]
# Workflow-level testing lives downstream in ComfyUI-LiTo (which is
# the consumer of GaussianPack's PreviewGaussians + GaussianMerge
# nodes). GaussianPack itself only verifies registration/instantiation.

[test.platforms]
linux = true
macos = true
windows = true
windows_portable = true
linux_gpu = true
windows_gpu = true
windows_portable_gpu = true
macos_desktop = false
windows_desktop = false
windows_desktop_gpu = false
