<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gaussian Splat Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #viewerContainer {
            position: relative;
            flex: 1;
            min-height: 200px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ff6b6b;
            padding: 20px;
            max-width: 80%;
        }

        .error.hidden {
            display: none;
        }

        #controlsBar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            background: #252525;
            padding: 8px 12px;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        #controlsBar button {
            background: #444;
            border: none;
            color: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        #controlsBar button:hover {
            background: #555;
        }

        .view-axes {
            display: inline-flex;
            gap: 2px;
            padding: 2px 4px;
            background: #1f1f1f;
            border-radius: 4px;
        }

        .view-axes .view-btn {
            background: #333;
            color: #ddd;
            font-family: monospace;
            font-size: 11px;
            min-width: 30px;
            padding: 4px 6px;
        }

        .view-axes .view-btn:hover {
            background: #4a6;
            color: #fff;
        }

        .info-panel {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
            color: #aaa;
            font-size: 11px;
            font-family: monospace;
            z-index: 50;
        }

        .info-panel.hidden {
            display: none;
        }

        #settingsPanel {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(20,20,20,0.92);
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px 12px;
            min-width: 220px;
            z-index: 60;
            font-size: 11px;
            color: #ddd;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #settingsPanel.hidden { display: none; }

        #settingsPanel .row {
            display: grid;
            grid-template-columns: 70px 1fr 48px;
            gap: 6px;
            align-items: center;
        }

        #settingsPanel .row label { color: #888; }
        #settingsPanel .row input[type="range"] { width: 100%; }
        #settingsPanel .row input[type="number"] {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 11px;
            padding: 2px 4px;
            border-radius: 3px;
            width: 100%;
        }

        #settingsPanel .panel-title {
            font-weight: 600;
            color: #ccc;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="viewerContainer">
        <canvas id="canvas"></canvas>

        <div id="error" class="error hidden"></div>

        <div id="infoPanel" class="info-panel hidden">
            <div id="infoContent"></div>
        </div>

        <div id="settingsPanel" class="hidden">
            <div class="panel-title">Settings</div>
            <div class="row">
                <label for="fovInput">FOV</label>
                <input type="range" id="fovRange" min="5" max="170" step="1" value="50">
                <input type="number" id="fovInput" min="5" max="170" step="1" value="50">
            </div>
            <div class="row">
                <label for="scaleInput">Scale</label>
                <input type="range" id="scaleRange" min="1" max="50" step="0.5" value="20">
                <input type="number" id="scaleInput" min="1" max="50" step="0.5" value="20">
            </div>
            <div class="row">
                <label for="opacityInput">Opacity</label>
                <input type="range" id="opacityRange" min="0.05" max="1" step="0.01" value="1.0">
                <input type="number" id="opacityInput" min="0.05" max="1" step="0.01" value="1.0">
            </div>
            <div class="row" style="grid-template-columns: 70px 1fr;">
                <label for="useSpz">SPZ</label>
                <label style="display:flex;align-items:center;gap:6px;color:#aaa;cursor:pointer;">
                    <input type="checkbox" id="useSpz" checked>
                    <span style="font-size:10px;">Compress (~6× smaller, lossy)</span>
                </label>
            </div>
        </div>
    </div>

    <div id="controlsBar">
        <button id="settingsBtn" title="Settings">⚙ Settings</button>
        <span class="view-axes">
            <button class="view-btn" data-axis="x" data-sign="1"  title="View along +X (looks at YZ plane)">+X</button>
            <button class="view-btn" data-axis="x" data-sign="-1" title="View along −X">−X</button>
            <button class="view-btn" data-axis="y" data-sign="1"  title="View along +Y (looks at XZ plane)">+Y</button>
            <button class="view-btn" data-axis="y" data-sign="-1" title="View along −Y">−Y</button>
            <button class="view-btn" data-axis="z" data-sign="1"  title="View along +Z (looks at XY plane)">+Z</button>
            <button class="view-btn" data-axis="z" data-sign="-1" title="View along −Z">−Z</button>
        </span>
        <button id="resetCamera" title="Reset camera view">Reset View</button>
        <button id="screenshot" title="Take screenshot">Screenshot</button>
    </div>

    <script>
    // ============================================================
    // Gaussian Splat Viewer — dual backend (WebGL2 + WebGPU)
    //
    // Two renderers are bundled but only the chosen one is loaded
    // on the first LOAD_MESH_DATA postMessage:
    //   - WebGL2: Three.js + mkkellogg/GaussianSplats3D (SH=3)
    //   - WebGPU: PlayCanvas engine (gsplat component, SH=3)
    //
    // The rest of the viewer (camera persistence, settings panel,
    // axis buttons, screenshot, info panel) speaks to a small
    // adapter interface so the rendering library can be swapped at
    // runtime without rewiring the UI.
    // ============================================================

    const canvas       = document.getElementById('canvas');
    const errorEl      = document.getElementById('error');
    const infoPanel    = document.getElementById('infoPanel');
    const infoContent  = document.getElementById('infoContent');
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsBtn  = document.getElementById('settingsBtn');
    const fovRange     = document.getElementById('fovRange');
    const fovInput     = document.getElementById('fovInput');
    const scaleRange   = document.getElementById('scaleRange');
    const scaleInput   = document.getElementById('scaleInput');
    const opacityRange = document.getElementById('opacityRange');
    const opacityInput = document.getElementById('opacityInput');
    const useSpzCheck  = document.getElementById('useSpz');

    canvas.tabIndex = 0;
    canvas.style.outline = "none";
    canvas.addEventListener('pointerdown', () => canvas.focus({ preventScroll: true }));

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
        console.error('[GaussianViewer]', msg);
    }

    // ---- shared viewer state ------------------------------------
    let adapter        = null;            // current renderer adapter
    let adapterReady   = false;
    let pendingRestore = null;            // applied right after the next splat load
    let currentFovDeg  = 50;
    let currentScale   = 20.0;
    let currentOpacity = 1.0;
    let initialPose    = null;            // { pos, target, fov } captured at framing time
    const DEFAULT_SCALE_MULTIPLIER = 20.0;

    function setFovInputs(v)     { fovRange.value = v;     fovInput.value = v; }
    function setScaleInputs(v)   { scaleRange.value = v;   scaleInput.value = v; }
    function setOpacityInputs(v) { opacityRange.value = v; opacityInput.value = v; }

    // ---- script loader (UMD libs, ordered) ----------------------
    const _loaded = new Set();
    function loadScript(src) {
        if (_loaded.has(src)) return Promise.resolve();
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src; s.async = false;
            s.onload = () => { _loaded.add(src); resolve(); };
            s.onerror = () => reject(new Error("Failed to load " + src));
            document.head.appendChild(s);
        });
    }

    async function bootRenderer(kind) {
        // Phase-A0d: until a real PlayCanvas adapter ships, "webgpu" is a
        // synonym for "webgl2". Doing the fallback at the bootloader level
        // (instead of in PCSplatAdapter) avoids loading three.min.js twice
        // and the "Multiple instances of Three.js" warning that comes with
        // it.
        if (kind === "webgpu") {
            console.warn("[GaussianViewer] webgpu requested; falling back to webgl2 "
                       + "(PlayCanvas adapter not implemented yet)");
            kind = "webgl2";
        }
        await loadScript("./js/three.min.js");
        await loadScript("./js/gaussian-splats-3d.umd.js");
        return new MkkelloggAdapter(canvas);
    }

    // ============================================================
    // Adapter: WebGL2 — mkkellogg/GaussianSplats3D + Three.js
    // ============================================================
    class MkkelloggAdapter {
        constructor(canvas) {
            this.canvas = canvas;
            this.viewer = null;
            this.splatMesh = null;
        }
        kind() { return "webgl2"; }

        init() {
            const GS = window["Gaussian Splats 3D"];
            if (!GS) throw new Error("GaussianSplats3D library not loaded");
            if (!window.THREE) throw new Error("THREE not loaded");

            // Construct an external WebGLRenderer that targets OUR canvas so
            // the iframe doesn't grow a second canvas next to it.
            const W = this.canvas.clientWidth  || 512;
            const H = this.canvas.clientHeight || 512;
            const dpr = window.devicePixelRatio || 1;
            console.log(`[Mkkellogg] init: canvas client=${W}x${H} dpr=${dpr.toFixed(2)} parent=#${this.canvas.parentElement?.id}`);
            console.log(`[Mkkellogg] container has ${this.canvas.parentElement?.children.length} child(ren) before init`);

            // Phase-A0a: WebGLRenderer construction can throw with
            // "Web page caused context loss and was blocked" when Chrome's
            // per-tab anti-DoS guard has been tripped by repeated iframe
            // reloads. Catch it, paint a clear error overlay, and bubble
            // the failure to the parent so the loading bar turns red.
            let renderer;
            try {
                renderer = new THREE.WebGLRenderer({
                    canvas: this.canvas,
                    antialias: false,
                    alpha: false,
                    // preserveDrawingBuffer:true so the canvas keeps its last
                    // rendered frame on the screen during idle periods.
                    // mkkellogg's selfDrivenUpdate only calls renderer.render
                    // when shouldRender() reports a real reason to paint
                    // (camera changed, visible-region fading in, etc.). On
                    // idle frames it skips the render — and with the default
                    // preserveDrawingBuffer:false, the browser compositor
                    // clears the back buffer after composite, leaving us
                    // with a black canvas. This costs a small amount of
                    // memory bandwidth but matters for a static viewer.
                    preserveDrawingBuffer: true,
                });
            } catch (err) {
                const msg = "WebGL context creation refused — reload the ComfyUI tab once "
                          + "(Chrome anti-DoS guard). Detail: " + (err?.message || err);
                console.error("[Mkkellogg] FATAL:", msg);
                showError(msg);
                try {
                    window.parent.postMessage({ type: "MESH_ERROR", error: msg, timestamp: Date.now() }, "*");
                } catch (_) {}
                throw err;
            }
            renderer.setPixelRatio(dpr);
            renderer.setSize(W, H, false);
            renderer.setClearColor(0x1a1a1a, 1.0);
            console.log("[Mkkellogg] WebGLRenderer ready. drawingBufferSize=",
                        renderer.domElement.width, "x", renderer.domElement.height);

            // Phase-A0b: surface context-loss events. preventDefault() in
            // the lost handler is what lets the canvas come back later.
            this.canvas.addEventListener("webglcontextlost", (e) => {
                e.preventDefault();
                console.warn("[Mkkellogg] WebGL context LOST (preventDefault — waiting for restore)");
                try {
                    window.parent.postMessage({
                        type: "MESH_ERROR",
                        error: "WebGL context lost; will retry on restore.",
                        timestamp: Date.now(),
                    }, "*");
                } catch (_) {}
            });
            this.canvas.addEventListener("webglcontextrestored", () => {
                console.log("[Mkkellogg] WebGL context RESTORED");
            });

            const camera = new THREE.PerspectiveCamera(50, W / Math.max(1, H), 0.05, 1000);
            camera.position.set(0, 0, -3);
            camera.lookAt(0, 0, 0);

            // Phase-A A3: ?upY=-1 in the iframe URL flips the camera-up
            // probe (LiTo may be Y-down). Default is Y-up.
            const _upY = new URLSearchParams(location.search).get("upY");
            const _camUp = _upY === "-1" ? [0, -1, 0] : [0, 1, 0];
            console.log("[Mkkellogg] cameraUp =", _camUp, "(set ?upY=-1 in iframe src to flip)");

            // gpuAcceleratedSort:true is incompatible with this version of
            // mkkellogg/GaussianSplats3D when the caller provides its own
            // renderer. With gpuAcceleratedSort=true the splat centers are
            // never uploaded to the sort worker, the worker's
            // uploadedSplatCount stays 0, and every sort returns
            // splatRenderCount=0 → drawRange.count=0 → zero draw calls →
            // black canvas. (Found via Playwright trace: updateRenderIndexes
            // was called with renderSplatCount=0.) Fall back to CPU-side
            // distance computation, which does upload centers.
            this.viewer = new GS.Viewer({
                renderer: renderer,
                camera: camera,
                useBuiltInControls: true,
                sphericalHarmonicsDegree: 3,
                gpuAcceleratedSort: false,
                sharedMemoryForWorkers: false,
                ignoreDevicePixelRatio: false,
                initialCameraPosition: [0, 0, -3],
                initialCameraLookAt: [0, 0, 0],
                cameraUp: _camUp,
                selfDrivenMode: true,
            });
            console.log("[Mkkellogg] viewer constructed.");
            this.viewer.start();
            console.log("[Mkkellogg] viewer.start() returned. self-driven RAF active.");

            // Heartbeat: count rendered frames; log first one + every 60th.
            this._frameCount = 0;
            const origUpdate = this.viewer.selfDrivenUpdateFunc;
            this.viewer.selfDrivenUpdateFunc = (...args) => {
                origUpdate.apply(this.viewer, args);
                this._frameCount += 1;
                if (this._frameCount === 1) console.log("[Mkkellogg] first frame rendered.");
                else if (this._frameCount % 60 === 0) {
                    console.log(`[Mkkellogg] heartbeat: ${this._frameCount} frames`);
                }
            };

            // Re-bind the OrbitControls to our canvas so wheel/drag events on
            // the correct element drive the camera.
            if (this.viewer.controls && this.viewer.controls.domElement !== this.canvas) {
                this.viewer.controls.domElement = this.canvas;
            }

            // Resize-observer keeps the renderer matching the canvas size.
            const ro = new ResizeObserver(() => {
                const w = this.canvas.clientWidth  || 1;
                const h = this.canvas.clientHeight || 1;
                renderer.setSize(w, h, false);
                camera.aspect = w / Math.max(1, h);
                camera.updateProjectionMatrix();
            });
            ro.observe(this.canvas);
        }

        async loadSplat(blobUrl, filename) {
            const GS = window["Gaussian Splats 3D"];
            const isSpz = typeof filename === "string" && filename.toLowerCase().endsWith(".spz");
            const sceneFormat = isSpz ? GS.SceneFormat.Spz : GS.SceneFormat.Ply;

            // addSplatScene() appends to the existing scene list; if the
            // user runs the workflow twice or swaps inputs, the old splats
            // would stick around and overlap the new ones. Tear down any
            // existing scenes first.
            const existingSceneCount = this.viewer.getSceneCount ? this.viewer.getSceneCount() : 0;
            if (existingSceneCount > 0) {
                const idxs = [];
                for (let i = 0; i < existingSceneCount; i++) idxs.push(i);
                console.log(`[Mkkellogg] removing ${existingSceneCount} existing scene(s) before reload`);
                try { await this.viewer.removeSplatScenes(idxs, false); }
                catch (e) { console.warn("[Mkkellogg] removeSplatScenes failed:", e?.message || e); }
            }

            console.log(`[Mkkellogg] addSplatScene starting (format=${isSpz ? "spz" : "ply"})...`);
            const t0 = performance.now();
            await this.viewer.addSplatScene(blobUrl, {
                format: sceneFormat,
                showLoadingUI: false,
                progressiveLoad: false,
                // Phase-A A1: was 5/255; mkkellogg's default cuts off any
                // splat whose post-sigmoid alpha is below ~2 %. LiTo's
                // opacity distribution may sit near that boundary and lose
                // most of the cloud. Keep all splats for now.
                splatAlphaRemovalThreshold: 0,
            });
            const dt = performance.now() - t0;
            this.splatMesh = this.viewer.splatMesh;
            const splatCount = this.splatMesh?.getSplatCount?.() ?? 0;
            const sceneCount = this.splatMesh?.getSceneCount?.() ?? 0;
            console.log(`[Mkkellogg] addSplatScene resolved in ${dt.toFixed(0)} ms, `
                      + `${splatCount} splats across ${sceneCount} scene(s).`);

            const container = this.canvas.parentElement;
            console.log("[Mkkellogg] container children after load:",
                Array.from(container.children)
                     .map(c => c.tagName.toLowerCase() + (c.id ? "#" + c.id : "")).join(", "));
            console.log("[Mkkellogg] canvas: client=",
                        this.canvas.clientWidth, "x", this.canvas.clientHeight,
                        " drawing=", this.canvas.width, "x", this.canvas.height);
        }

        getBounds() {
            if (!this.splatMesh) return null;
            // mkkellogg's splatMesh is a shader-driven mesh; its Three.js
            // bounding box is empty. We sample the splat centers and use
            // 1st/99th percentile per axis as the framing bounds — strict
            // min/max gets blown out by a handful of outlier "background"
            // splats and leaves the actual object as a tiny dot in the
            // frame.
            const n = this.splatMesh.getSplatCount();
            if (!n) return null;
            const v = new THREE.Vector3();
            const step = (n > 50000) ? Math.ceil(n / 50000) : 1;
            const xs = [], ys = [], zs = [];
            for (let i = 0; i < n; i += step) {
                this.splatMesh.getSplatCenter(i, v);
                xs.push(v.x); ys.push(v.y); zs.push(v.z);
            }
            if (!xs.length) return null;
            const cmp = (a, b) => a - b;
            xs.sort(cmp); ys.sort(cmp); zs.sort(cmp);
            const k = xs.length;
            // 5/95 percentile — Gaussian-splat scenes often have a thin
            // halo of low-opacity splats well outside the actual object;
            // strict min/max (or 1/99) leaves them dominating the bounds.
            const lo = Math.floor(k * 0.05), hi = Math.floor(k * 0.95);
            const minX = xs[lo], maxX = xs[hi];
            const minY = ys[lo], maxY = ys[hi];
            const minZ = zs[lo], maxZ = zs[hi];
            return {
                center: { x: (minX + maxX) / 2, y: (minY + maxY) / 2, z: (minZ + maxZ) / 2 },
                size:   { x: maxX - minX,       y: maxY - minY,       z: maxZ - minZ },
            };
        }

        getCameraPosition() {
            const p = this.viewer.camera.position;
            return { x: p.x, y: p.y, z: p.z };
        }
        setCameraPosition(x, y, z) {
            this.viewer.camera.position.set(x, y, z);
        }
        getCameraTarget() {
            const t = this.viewer.controls?.target;
            return t ? { x: t.x, y: t.y, z: t.z } : { x: 0, y: 0, z: 0 };
        }
        setCameraTarget(x, y, z) {
            if (this.viewer.controls) {
                this.viewer.controls.target.set(x, y, z);
                this.viewer.controls.update();
            }
        }
        setFov(deg) {
            this.viewer.camera.fov = deg;
            this.viewer.camera.updateProjectionMatrix();
        }
        // TODO(v2): per-splat scale / opacity mutation against
        // splatMesh.splatBuffer. The slider events still fire so we
        // keep the UI live; visual effect lands in a follow-up.
        setScaleMultiplier(_f)   { /* no-op for v1 */ }
        setOpacityMultiplier(_f) { /* no-op for v1 */ }
        screenshot() {
            return this.viewer.renderer.domElement.toDataURL("image/png");
        }
    }

    // ============================================================
    // Adapter: WebGPU — PlayCanvas (stub for v1)
    // ============================================================
    class PCSplatAdapter {
        constructor(canvas) {
            console.warn("[GaussianViewer] PCSplatAdapter (WebGPU) is a stub in v1; "
                       + "falling back to mkkellogg WebGL2 path.");
            this.canvas = canvas;
            this._fallback = null;
        }
        kind() { return "webgl2-fallback"; }
        async init() {
            await loadScript("./js/three.min.js");
            await loadScript("./js/gaussian-splats-3d.umd.js");
            this._fallback = new MkkelloggAdapter(this.canvas);
            this._fallback.init();
        }
        async loadSplat(u, f)      { return this._fallback.loadSplat(u, f); }
        getBounds()                { return this._fallback.getBounds(); }
        getCameraPosition()        { return this._fallback.getCameraPosition(); }
        setCameraPosition(x,y,z)   { return this._fallback.setCameraPosition(x,y,z); }
        getCameraTarget()          { return this._fallback.getCameraTarget(); }
        setCameraTarget(x,y,z)     { return this._fallback.setCameraTarget(x,y,z); }
        setFov(d)                  { return this._fallback.setFov(d); }
        setScaleMultiplier(f)      { return this._fallback.setScaleMultiplier(f); }
        setOpacityMultiplier(f)    { return this._fallback.setOpacityMultiplier(f); }
        screenshot()               { return this._fallback.screenshot(); }
    }

    // ============================================================
    // Camera helpers, framing, persistence
    // ============================================================
    let _lastEmitted = "";
    function emitCameraState() {
        if (!adapterReady) return;
        const p = adapter.getCameraPosition();
        const t = adapter.getCameraTarget();
        const state = {
            v: 1,
            pos:    [p.x, p.y, p.z],
            target: [t.x, t.y, t.z],
            fov:    currentFovDeg,
            scale:  currentScale,
            opacity: currentOpacity,
        };
        const s = JSON.stringify(state);
        if (s === _lastEmitted) return;
        _lastEmitted = s;
        try { window.parent.postMessage({ type: "CAMERA_STATE", state }, "*"); }
        catch (_) {}
    }

    function applyCameraState(state) {
        if (!adapterReady || !state) return;
        if (Array.isArray(state.pos)) {
            adapter.setCameraPosition(state.pos[0], state.pos[1], state.pos[2]);
        }
        if (Array.isArray(state.target)) {
            adapter.setCameraTarget(state.target[0], state.target[1], state.target[2]);
        }
        if (typeof state.fov === "number") {
            currentFovDeg = state.fov;
            setFovInputs(state.fov);
            adapter.setFov(state.fov);
        }
        if (typeof state.scale === "number") {
            currentScale = state.scale;
            setScaleInputs(state.scale);
            adapter.setScaleMultiplier(state.scale);
        }
        if (typeof state.opacity === "number") {
            currentOpacity = state.opacity;
            setOpacityInputs(state.opacity);
            adapter.setOpacityMultiplier(state.opacity);
        }
        console.log("[GaussianViewer] Restored camera state from workflow");
    }

    function frameOnBounds(fovDeg) {
        const b = adapter.getBounds();
        if (!b) {
            console.warn("[GaussianViewer] frameOnBounds: getBounds() returned null — nothing to frame.");
            return;
        }
        console.log(`[GaussianViewer] frameOnBounds: bounds center=(${b.center.x.toFixed(3)}, ${b.center.y.toFixed(3)}, ${b.center.z.toFixed(3)}) size=(${b.size.x.toFixed(3)}, ${b.size.y.toFixed(3)}, ${b.size.z.toFixed(3)})`);
        currentFovDeg = fovDeg;
        adapter.setFov(fovDeg);

        const maxExtent = Math.max(b.size.x, b.size.y, b.size.z);
        const fovRad = fovDeg * Math.PI / 180;
        // 1.15 leaves a small breathing border instead of jamming the
        // object to the frame edges. Tighter than the 1.5 default which
        // made the object look distant.
        const radius = Math.max(0.1, (maxExtent / 2) / Math.tan(fovRad / 2) * 1.15);

        adapter.setCameraPosition(b.center.x, b.center.y, b.center.z - radius);
        adapter.setCameraTarget(b.center.x, b.center.y, b.center.z);

        initialPose = {
            pos:    [b.center.x, b.center.y, b.center.z - radius],
            target: [b.center.x, b.center.y, b.center.z],
            fov:    fovDeg,
        };
        const pp = adapter.getCameraPosition();
        const pt = adapter.getCameraTarget();
        console.log(`[GaussianViewer] Framed: cam=(${pp.x.toFixed(2)}, ${pp.y.toFixed(2)}, ${pp.z.toFixed(2)}) target=(${pt.x.toFixed(2)}, ${pt.y.toFixed(2)}, ${pt.z.toFixed(2)}) maxExtent=${maxExtent.toFixed(2)} radius=${radius.toFixed(2)} fov=${fovDeg}`);
        emitCameraState();
    }

    function viewAlongAxis(axis, sign) {
        const b = adapter.getBounds();
        if (!b) return;
        const maxExtent = Math.max(b.size.x, b.size.y, b.size.z);
        const fovRad = currentFovDeg * Math.PI / 180;
        const radius = Math.max(0.1, (maxExtent / 2) / Math.tan(fovRad / 2) * 1.5);
        const off = { x: 0, y: 0, z: 0 };
        off[axis] = sign * radius;
        adapter.setCameraPosition(b.center.x + off.x, b.center.y + off.y, b.center.z + off.z);
        adapter.setCameraTarget(b.center.x, b.center.y, b.center.z);
        console.log('[GaussianViewer] view along', (sign > 0 ? '+' : '-') + axis.toUpperCase());
        emitCameraState();
    }

    function resetCamera() {
        if (!initialPose) return;
        const { pos, target, fov } = initialPose;
        currentFovDeg = fov;
        setFovInputs(fov);
        adapter.setFov(fov);
        adapter.setCameraPosition(pos[0], pos[1], pos[2]);
        adapter.setCameraTarget(target[0], target[1], target[2]);
        emitCameraState();
    }

    // ---- slider updates -----------------------------------------
    function updateFov(v) {
        v = Math.max(5, Math.min(170, parseFloat(v) || 50));
        currentFovDeg = v;
        setFovInputs(v);
        if (adapterReady) {
            // re-frame to keep the object filling roughly the same area
            const b = adapter.getBounds();
            if (b) frameOnBounds(v); else { adapter.setFov(v); emitCameraState(); }
        }
    }
    function updateGaussianScale(v) {
        v = Math.max(0.1, Math.min(100, parseFloat(v) || 1.0));
        currentScale = v;
        setScaleInputs(v);
        if (adapterReady) adapter.setScaleMultiplier(v);
        emitCameraState();
    }
    function updateOpacity(v) {
        v = Math.max(0, Math.min(1, parseFloat(v) || 1.0));
        currentOpacity = v;
        setOpacityInputs(v);
        if (adapterReady) adapter.setOpacityMultiplier(v);
        emitCameraState();
    }

    // ============================================================
    // Bootstrap on first LOAD_MESH_DATA
    // ============================================================
    let _bootPromise = null;
    async function ensureRenderer(kind) {
        if (!_bootPromise) {
            _bootPromise = (async () => {
                adapter = await bootRenderer(kind);
                await adapter.init();
                adapterReady = true;
                console.log("[GaussianViewer] Adapter ready:", adapter.kind());
            })();
        }
        await _bootPromise;
    }

    async function loadPLYFromData(arrayBuffer, filename, extrinsics, intrinsics, renderer) {
        try {
            const tEnsure0 = performance.now();
            console.log(`[GaussianViewer] ensureRenderer('${renderer || 'webgl2'}') starting...`);
            await ensureRenderer(renderer || "webgl2");
            console.log(`[GaussianViewer] ensureRenderer done in ${(performance.now()-tEnsure0).toFixed(0)} ms`);

            // Hand the byte buffer to the chosen adapter via a blob URL.
            const blob = new Blob([arrayBuffer], { type: 'application/octet-stream' });
            const blobUrl = URL.createObjectURL(blob);
            try {
                console.log(`[GaussianViewer] Loading splat (${arrayBuffer.byteLength.toLocaleString()} bytes) via ${adapter.kind()}...`);
                const tLoad0 = performance.now();
                await adapter.loadSplat(blobUrl, filename);
                console.log(`[GaussianViewer] adapter.loadSplat resolved in ${(performance.now()-tLoad0).toFixed(0)} ms`);
            } finally {
                URL.revokeObjectURL(blobUrl);
            }

            // Derive FOV from intrinsics if provided, else use current widget value.
            let fovDeg = currentFovDeg;
            if (intrinsics && Array.isArray(intrinsics) && intrinsics.length >= 2) {
                const fy = intrinsics[1][1];
                const cy = intrinsics[1][2];
                const h  = cy * 2;
                fovDeg = 2 * Math.atan(h / (2 * fy)) * 180 / Math.PI;
            }
            // Clamp telephoto / fisheye ends so a stale widget value can't push
            // the camera to infinity or invert it. The slider lets users widen
            // to 5° or narrow to 170° after load if they really want.
            fovDeg = Math.max(20, Math.min(120, fovDeg));
            setFovInputs(fovDeg);
            frameOnBounds(fovDeg);

            // Apply current slider values (no-op in v1 for scale/opacity, but
            // adapters can implement them later without changing this path).
            adapter.setScaleMultiplier(currentScale);
            adapter.setOpacityMultiplier(currentOpacity);

            // Late-applied saved pose (overrides default framing).
            if (pendingRestore) {
                applyCameraState(pendingRestore);
                pendingRestore = null;
            }

            infoPanel.classList.remove('hidden');
            infoContent.innerHTML =
                '<span style="color:#6cc;">Gaussian Splat Loaded</span><br>'
                + `<span style="color:#888;">${filename || ''}</span>`;

            window.parent.postMessage({
                type: 'MESH_LOADED', error: null, timestamp: Date.now(),
            }, '*');
            console.log('[GaussianViewer] Loaded successfully');
        } catch (err) {
            console.error('[GaussianViewer] Load error:', err);
            showError('Failed to load splat: ' + (err?.message || err));
            window.parent.postMessage({
                type: 'MESH_ERROR', error: String(err?.message || err), timestamp: Date.now(),
            }, '*');
        }
    }

    // ============================================================
    // Wiring
    // ============================================================
    fovRange.addEventListener('input',  e => updateFov(e.target.value));
    fovInput.addEventListener('change', e => updateFov(e.target.value));
    scaleRange.addEventListener('input',  e => updateGaussianScale(e.target.value));
    scaleInput.addEventListener('change', e => updateGaussianScale(e.target.value));
    opacityRange.addEventListener('input',  e => updateOpacity(e.target.value));
    opacityInput.addEventListener('change', e => updateOpacity(e.target.value));

    settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('hidden'));

    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            viewAlongAxis(btn.dataset.axis, parseInt(btn.dataset.sign, 10));
        });
    });

    document.getElementById('resetCamera').addEventListener('click', resetCamera);
    document.getElementById('screenshot').addEventListener('click', () => {
        if (!adapterReady) return;
        try {
            window.parent.postMessage({
                type: 'SCREENSHOT',
                image: adapter.screenshot(),
                timestamp: Date.now(),
            }, '*');
            console.log('[GaussianViewer] Screenshot captured');
        } catch (err) {
            console.error('[GaussianViewer] Screenshot error:', err);
        }
    });

    // Persist camera pose to workflow whenever the user interacts.
    canvas.addEventListener('pointerup',  () => emitCameraState());
    canvas.addEventListener('wheel',      () => emitCameraState(), { passive: true });

    // SPZ toggle — flip → tell parent → parent re-fetches with the new
    // format. Persistence (workflow JSON) is the parent's job.
    useSpzCheck.addEventListener('change', (e) => {
        const useSPZ = !!e.target.checked;
        console.log('[GaussianViewer] SPZ toggle ->', useSPZ);
        try {
            window.parent.postMessage(
                { type: 'SETTING_CHANGED', key: 'useSPZ', value: useSPZ }, '*',
            );
        } catch (_) {}
    });

    // Receive from parent
    window.addEventListener('message', (event) => {
        const msg = event.data || {};
        if (msg.type === 'LOAD_MESH_DATA' && msg.data) {
            console.log('[GaussianViewer] Received LOAD_MESH_DATA, size:',
                        msg.data.byteLength, 'renderer:', msg.renderer);
            loadPLYFromData(msg.data, msg.filename || 'gaussian.ply',
                            msg.extrinsics, msg.intrinsics, msg.renderer);
        } else if (msg.type === 'RESTORE_CAMERA_STATE' && msg.state) {
            if (adapterReady) applyCameraState(msg.state);
            else              pendingRestore = msg.state;
        } else if (msg.type === 'RESTORE_VIEWER_SETTINGS' && msg.settings) {
            // Parent owns the source of truth for viewer settings; sync UI
            // without firing the change handler (which would loop).
            if (typeof msg.settings.useSPZ === 'boolean') {
                useSpzCheck.checked = msg.settings.useSPZ;
            }
        }
    });

    console.log('[GaussianViewer] Ready — waiting for LOAD_MESH_DATA');

    // -------- Debug hooks (headless Playwright drives these) -----
    // Closure-scoped vars (adapter, viewer, splatMesh) aren't visible
    // from page.evaluate(); expose a getter so the harness can probe.
    window.__gs = {
        state() {
            const m = adapter && adapter.splatMesh;
            return {
                adapterReady,
                adapterKind: adapter && adapter.kind && adapter.kind(),
                splatCount: (m && m.getSplatCount && m.getSplatCount()) || 0,
                sceneCount: (m && m.getSceneCount && m.getSceneCount()) || 0,
                hasViewer: !!(adapter && adapter.viewer),
                hasMaterial: !!(m && m.material),
                materialType: m && m.material && m.material.type,
                materialUniforms: m && m.material && m.material.uniforms ? Object.keys(m.material.uniforms) : null,
                cameraPos: adapter ? adapter.getCameraPosition() : null,
                cameraTarget: adapter ? adapter.getCameraTarget() : null,
                fov: currentFovDeg,
                frames: adapter && adapter._frameCount,
            };
        },
        // Run a fn against the live adapter/viewer/splatMesh.
        run(fnSrc) {
            // eslint-disable-next-line no-new-func
            const fn = new Function('adapter', 'viewer', 'splatMesh', 'THREE', 'GS', fnSrc);
            return fn(
                adapter,
                adapter && adapter.viewer,
                adapter && adapter.splatMesh,
                window.THREE,
                window["Gaussian Splats 3D"],
            );
        },
    };
    </script>
</body>
</html>
